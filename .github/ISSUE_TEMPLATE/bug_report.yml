name: Bug report
description: Report a reproducible ARGUS Studio defect.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Do not include private datasets, local account names, credentials, or model weights. Report security issues through the Security tab.
  - type: input
    id: version
    attributes:
      label: ARGUS Studio version
      placeholder: v0.1.0 or commit SHA
    validations:
      required: true
  - type: dropdown
    id: install
    attributes:
      label: Installation
      options:
        - GitHub Release DMG
        - Source checkout
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS and hardware
      placeholder: macOS 15.5, Apple M2
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: Use synthetic or redacted data and list exact steps.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Redacted logs or screenshots
      description: Remove personal paths, private data, and credentials before attaching.
