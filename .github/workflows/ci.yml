name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: macOS verification
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.7.0 --activate

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit JavaScript dependencies
        run: pnpm audit --audit-level high

      - name: Check Python dependency consistency
        run: python -m pip check

      - name: Scan release hygiene
        run: ./scripts/security_scan.sh

      - name: Test Python core
        run: pytest

      - name: Type-check
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Test renderer
        run: pnpm test

      - name: Build renderer and Electron processes
        run: pnpm run build
